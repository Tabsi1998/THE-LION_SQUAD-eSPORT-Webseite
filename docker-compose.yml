services:
  mongodb:
    image: mongo:7
    container_name: tls-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - tls-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tls-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-tls_arena}"
      APP_ENV: "${APP_ENV:-production}"
      CORS_ORIGINS: "${CORS_ORIGINS:?Set CORS_ORIGINS in .env before deploying}"
      FRONTEND_URL: "${FRONTEND_URL:?Set FRONTEND_URL in .env before deploying}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env before deploying}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@thelionsquad.at}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before deploying}"
      SEED_DEMO: "${SEED_DEMO:-false}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/backend/uploads}"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - uploads_data:${UPLOAD_DIR:-/app/backend/uploads}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tls-net

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: "${PUBLIC_BACKEND_URL:?Set PUBLIC_BACKEND_URL in .env before deploying}"
    container_name: tls-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tls-net

volumes:
  mongo_data:
  uploads_data:

networks:
  tls-net:
    driver: bridge
