version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Vienna
    commit-message:
      prefix: chore

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    groups:
      backend-python:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    groups:
      frontend-npm:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    groups:
      mobile-expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react"
          - "react-native"
        update-types:
          - minor
          - patch
      mobile-npm:
        patterns:
          - "*"
        exclude-patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react"
          - "react-native"
          - "react-native-keyboard-controller"
          - "react-native-reanimated"
          - "react-native-safe-area-context"
          - "react-native-screens"
          - "react-native-worklets"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "react"
      - dependency-name: "react-native"
      - dependency-name: "react-native-keyboard-controller"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-safe-area-context"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-worklets"
    commit-message:
      prefix: chore
