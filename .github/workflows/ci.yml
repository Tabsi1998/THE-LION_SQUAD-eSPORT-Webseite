name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Compile backend
        run: python -m compileall -q backend
      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt
      - name: Run backend smoke tests
        run: >
          python -m pytest
          backend/tests/test_public_phase.py
          backend/tests/test_match_v2_results_unit.py
          backend/tests/test_bracket_engine_unit.py
          backend/tests/test_custom_bracket_unit.py
          backend/tests/test_tournament_permissions_unit.py
          backend/tests/test_achievement_catalog_audit.py
          backend/tests/test_birthday_mailer_unit.py
          backend/tests/test_notification_preferences.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Audit frontend dependencies
        working-directory: frontend
        run: yarn audit:high
      - name: Build frontend
        working-directory: frontend
        run: yarn build
      - name: Run frontend unit smoke
        working-directory: frontend
        run: yarn test --watchAll=false --passWithNoTests
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests desktop and mobile
        working-directory: frontend
        run: yarn test:e2e

  mobile:
    name: Mobile App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Audit mobile dependencies
        working-directory: mobile
        run: npm audit --audit-level=moderate
      - name: Typecheck mobile app
        working-directory: mobile
        run: npm run typecheck
      - name: Validate Expo config
        working-directory: mobile
        run: npx expo config --type public
