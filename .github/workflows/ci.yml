name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Compile backend
        run: python -m compileall -q backend
      - name: Run backend smoke tests
        run: python -m pytest backend/tests/test_public_phase.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build frontend
        working-directory: frontend
        run: yarn build
      - name: Run frontend unit smoke
        working-directory: frontend
        run: yarn test --watchAll=false --passWithNoTests
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        working-directory: frontend
        run: yarn test:e2e --project=chromium
