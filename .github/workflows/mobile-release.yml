name: Mobile APK Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - stable
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck mobile app
        working-directory: mobile
        run: npm run typecheck

      - name: Resolve release metadata
        id: meta
        working-directory: mobile
        shell: bash
        run: |
          VERSION="$(node -p "require('./app.json').expo.version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "app.json version ($VERSION) and package.json version ($PACKAGE_VERSION) differ" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" == *"alpha"* ]]; then
              CHANNEL="alpha"
            elif [[ "${GITHUB_REF_NAME}" == *"beta"* ]]; then
              CHANNEL="beta"
            else
              CHANNEL="stable"
            fi
          else
            CHANNEL="${{ inputs.channel }}"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="LionsAPP-android-${CHANNEL}-v${VERSION}-${SHORT_SHA}.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate Android project
        working-directory: mobile
        env:
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Configure Android release signing
        working-directory: mobile
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || missing+=("ANDROID_KEYSTORE_BASE64")
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -n "$ANDROID_KEY_ALIAS" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "$ANDROID_KEY_PASSWORD" ] || missing+=("ANDROID_KEY_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing Android release signing secrets: ${missing[*]}"
            echo "GitHub releases must be signed with the stable LionsAPP upload key."
            echo "Set these as Repository secrets in Settings -> Secrets and variables -> Actions."
            echo "Do not store them as Variables and do not store them only in an Environment unless this workflow is configured to use that Environment."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo ""
            echo "TLS_UPLOAD_STORE_FILE=release.keystore"
            echo "TLS_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "TLS_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "TLS_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties
          node scripts/configure-android-signing.cjs

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Stage APK
        working-directory: mobile
        run: |
          mkdir -p builds
          cp android/app/build/outputs/apk/release/app-release.apk "builds/${{ steps.meta.outputs.apk_name }}"
          ls -lh "builds/${{ steps.meta.outputs.apk_name }}"

      - name: Verify APK signature and checksum
        working-directory: mobile
        shell: bash
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs "builds/${{ steps.meta.outputs.apk_name }}" | tee "builds/${{ steps.meta.outputs.apk_name }}.signature.txt"
          if grep -q "CN=Android Debug" "builds/${{ steps.meta.outputs.apk_name }}.signature.txt"; then
            echo "::error::APK is signed with the Android debug certificate."
            exit 1
          fi
          sha256sum "builds/${{ steps.meta.outputs.apk_name }}" > "builds/${{ steps.meta.outputs.apk_name }}.sha256"

      - name: Generate release notes
        id: notes
        working-directory: mobile
        shell: bash
        run: |
          NOTES_FILE="builds/release-notes.md"
          VERSION="${{ steps.meta.outputs.version }}"
          APK_NAME="${{ steps.meta.outputs.apk_name }}"
          SHA256="$(cut -d ' ' -f 1 "builds/${APK_NAME}.sha256")"
          SIGNER="$(grep -m 1 "Signer #1 certificate DN" "builds/${APK_NAME}.signature.txt" | sed 's/^Signer #1 certificate DN: //')"
          SIGNER_SHA="$(grep -m 1 "Signer #1 certificate SHA-256 digest" "builds/${APK_NAME}.signature.txt" | sed 's/^Signer #1 certificate SHA-256 digest: //')"
          {
            echo "# LionsAPP v${VERSION}"
            echo ""
            echo "**Channel:** \`${{ steps.meta.outputs.channel }}\`"
            echo ""
            echo "**APK:** \`${APK_NAME}\`"
            echo ""
            echo "**SHA-256:** \`${SHA256}\`"
            echo ""
            echo "**Signer:** \`${SIGNER}\`"
            echo ""
            echo "**Signer SHA-256:** \`${SIGNER_SHA}\`"
            echo ""
            echo "## Changelog"
            echo ""
            awk -v ver="$VERSION" '
              $0 ~ /^## / {
                if (found) exit
                found = index($0, ver) > 0
                next
              }
              found { print }
            ' CHANGELOG.md
            echo ""
            echo "## Installation"
            echo ""
            echo "Diese APK ist eine Alpha-Testversion. Bei Installation ausserhalb von Google Play kann Android weiterhin Hinweise zu externen Quellen oder Play Protect anzeigen. Fuer die sauberste Installation ohne Sideload-Warnung muss dieselbe App ueber Google Play Testing verteilt werden."
          } > "$NOTES_FILE"
          echo "notes_file=mobile/${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk_name }}
          path: |
            mobile/builds/${{ steps.meta.outputs.apk_name }}
            mobile/builds/${{ steps.meta.outputs.apk_name }}.sha256
            mobile/builds/${{ steps.meta.outputs.apk_name }}.signature.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          name: LionsAPP v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.channel }})
          prerelease: ${{ steps.meta.outputs.channel != 'stable' }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            mobile/builds/${{ steps.meta.outputs.apk_name }}
            mobile/builds/${{ steps.meta.outputs.apk_name }}.sha256
            mobile/builds/${{ steps.meta.outputs.apk_name }}.signature.txt
