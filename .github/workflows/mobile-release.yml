name: Mobile APK Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - stable
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK
        uses: android-actions/setup-android@v4

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck mobile app
        working-directory: mobile
        run: npm run typecheck

      - name: Resolve release metadata
        id: meta
        working-directory: mobile
        shell: bash
        run: |
          VERSION="$(node -p "require('./app.json').expo.version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "app.json version ($VERSION) and package.json version ($PACKAGE_VERSION) differ" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" == *"alpha"* ]]; then
              CHANNEL="alpha"
            elif [[ "${GITHUB_REF_NAME}" == *"beta"* ]]; then
              CHANNEL="beta"
            else
              CHANNEL="stable"
            fi
          else
            CHANNEL="${{ inputs.channel }}"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="THE-LION-SQUAD-android-${CHANNEL}-v${VERSION}-${SHORT_SHA}.apk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate Android project
        working-directory: mobile
        env:
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Stage APK
        working-directory: mobile
        run: |
          mkdir -p builds
          cp android/app/build/outputs/apk/release/app-release.apk "builds/${{ steps.meta.outputs.apk_name }}"
          ls -lh "builds/${{ steps.meta.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk_name }}
          path: mobile/builds/${{ steps.meta.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: THE LION SQUAD App v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.channel }})
          prerelease: ${{ steps.meta.outputs.channel != 'stable' }}
          generate_release_notes: true
          files: mobile/builds/${{ steps.meta.outputs.apk_name }}
