map $http_user_agent $tls_seo_preview_bot {
  default 0;
  ~*(googlebot|google-inspectiontool|googleother|adsbot-google|bingbot|bingpreview|duckduckbot|duckassistbot|yandexbot|baiduspider|applebot|facebookexternalhit|facebot|twitterbot|linkedinbot|slackbot|discordbot|telegrambot|whatsapp|skypeuripreview|pinterest|embedly|quora\ link\ preview|oai-searchbot|chatgpt-user|gptbot|claude-searchbot|claude-user|claudebot|anthropic-ai|perplexitybot|perplexity-user|bytespider|amazonbot) 1;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 150m;
  root /usr/share/nginx/html;
  index index.html;
  error_page 418 = @seo_preview;

  if ($host = "www.lionsquad.at") {
    return 301 https://lionsquad.at$request_uri;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Legacy WordPress/German URLs: keep users and search engines on canonical SPA routes.
  location ~ ^/(der-verein|ueber-uns)/?$ { return 301 https://lionsquad.at/about; }
  location ~ ^/(datenschutzerklaerung|datenschutz)/?$ { return 301 https://lionsquad.at/privacy; }
  location ~ ^/impressum/?$ { return 301 https://lionsquad.at/imprint; }
  location ~ ^/kontakt/?$ { return 301 https://lionsquad.at/contact; }
  location ~ ^/sponsoren/?$ { return 301 https://lionsquad.at/sponsors; }
  location ~ ^/partner/?$ { return 301 https://lionsquad.at/partners; }
  location ~ ^/mitglieder/?$ { return 301 https://lionsquad.at/members; }
  location ~ ^/(mitglied-werden|mitgliedschaft)/?$ { return 301 https://lionsquad.at/membership/join; }
  location ~ ^/turniere/?$ { return 301 https://lionsquad.at/tournaments; }
  location ~ ^/(gallerie|galerie-2)/?$ { return 301 https://lionsquad.at/galerie; }
  location ~ ^/gallerie/(.+)$ { return 301 https://lionsquad.at/galerie/$1; }
  location ~ ^/esports/?$ { return 301 https://lionsquad.at/tournaments; }
  location ~ ^/server/?$ { return 301 https://lionsquad.at/servers; }
  location ~ ^/spielerprofil/([^/?#]+)/?$ { return 301 https://lionsquad.at/u/$1; }
  location ~ ^/lan-party-2024/?$ { return 301 https://lionsquad.at/events; }
  location ~ ^/f1/?$ { return 301 https://lionsquad.at/fastlap; }
  location ~ ^/f1/(.+)$ { return 301 https://lionsquad.at/fastlap/$1; }

  # Removed WordPress/demo content should disappear from Google instead of being indexed as SPA fallback.
  location ~ ^/(elements|product|portfolio|tag|category|author)(/|$) {
    add_header X-Robots-Tag "noindex, nofollow" always;
    return 410;
  }

  location = /indexnow-key.txt {
    proxy_pass http://backend:8001/api/settings/indexnow-key.txt;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location = /sitemap.xml {
    proxy_pass http://backend:8001/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location = /sitemap-news.xml {
    proxy_pass http://backend:8001/sitemap-news.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location = /robots.txt {
    proxy_pass http://backend:8001/robots.txt;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location ^~ /api/ {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location @seo_preview {
    proxy_pass http://backend:8001/api/seo/preview?path=$uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location ~ ^/(news|events|tournaments|fastlap|f1|seasons|members|membership|u|players|teams|servers|gallery|galerie|references|community|sponsors|partners|about|board|values|contact)(/|$) {
    if ($tls_seo_preview_bot) {
      return 418;
    }
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri /index.html;
  }

  location / {
    if ($tls_seo_preview_bot) {
      return 418;
    }
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri /index.html;
  }

  # Static cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
