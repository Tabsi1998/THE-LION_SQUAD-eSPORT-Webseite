map $http_user_agent $tls_seo_preview_bot {
  default 0;
  ~*(googlebot|bingbot|duckduckbot|yandexbot|baiduspider|facebookexternalhit|facebot|twitterbot|linkedinbot|slackbot|discordbot|telegrambot|whatsapp|skypeuripreview|pinterest|embedly|quora\ link\ preview) 1;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 60m;
  root /usr/share/nginx/html;
  index index.html;
  error_page 418 = @seo_preview;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ^~ /api/ {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location @seo_preview {
    proxy_pass http://backend:8001/api/seo/preview?path=$uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=300" always;
  }

  location ~ ^/(news|events|tournaments|fastlap|seasons|members|u|players|gallery|galerie|references|community|sponsors|partners|about|contact)(/|$) {
    if ($tls_seo_preview_bot) {
      return 418;
    }
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri /index.html;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri /index.html;
  }

  # Static cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
